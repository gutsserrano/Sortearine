<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sortearine - Roleta de Sorteio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Sortearine</h1>
        <p class="subtitle">Cole os nomes da enquete e gire a roleta.</p>

        <label for="participantsInput">Participantes (1 por linha)</label>
        <textarea
          id="participantsInput"
          rows="10"
          placeholder="Ana&#10;Bruno&#10;Carla&#10;Diego"
        ></textarea>

        <div class="actions">
          <input id="csvInput" type="file" accept=".csv,.txt" />
          <button id="loadCsvBtn" type="button">Importar CSV/TXT</button>
          <button id="drawBtn" type="button" class="primary">Sortear</button>
        </div>

        <p id="participantsInfo">0 participantes válidos</p>
        <p id="result" class="result"></p>
      </section>

      <section class="card wheel-card">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
